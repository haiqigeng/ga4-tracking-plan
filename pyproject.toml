[project]
name = "ga4-tracking-plan-skill"
version = "1.0.0"
description = "GA4-only web analyst skill for human-readable tracking plans"
requires-python = ">=3.11"
dependencies = [
  "jsonschema>=4.22,<5",
  "openpyxl>=3.1,<4",
  "pillow>=10,<13",
]

[project.optional-dependencies]
dev = ["ruff>=0.12,<1"]

[tool.ruff]
target-version = "py311"
line-length = 160
extend-exclude = [
  "deliverables",
  "generated",
  "release",
  "tracking-plan-corpus-analysis",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I"]
