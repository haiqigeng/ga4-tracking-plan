name: Validate skill

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate-skill:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install validation dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install coverage ruff
      - name: Validate package
        run: |
          ruff check .
          python -m compileall -q scripts skill/scripts skill/tests
          python -m coverage run --source=skill/scripts -m unittest discover -s skill/tests
          python -m coverage report --fail-under=35
          python scripts/validate_package.py
