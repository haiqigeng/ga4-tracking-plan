name: Check official GA4 semantics

on:
  schedule:
    - cron: "17 7 * * 1"
  workflow_dispatch:

jobs:
  official-semantics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check selected semantics against official GA4 documentation
        run: python scripts/check_official_sources.py skill/references/example-tracking-plan.json --output official-check.json
