name: Release package

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validation dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install ruff
      - name: Validate package
        run: |
          ruff check .
          python -m compileall -q scripts skill/scripts tests
          python -m unittest discover -s tests
          python scripts/check_official_catalog.py --offline
          python scripts/validate_package.py
      - name: Build release zip
        run: |
          python scripts/create_release_package.py --version "${{ github.event.release.tag_name }}"
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" release/*.zip --clobber
