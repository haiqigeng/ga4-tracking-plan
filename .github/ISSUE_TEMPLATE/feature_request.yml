name: Feature request
description: Suggest a web analyst, tracking-plan, template, validation, or QA-readiness improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What tracking-plan workflow should this improve?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform scope
      options:
        - GA4
        - GA4 ecommerce
        - Workbook or screenshot output
        - Validation or migration
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you want.
    validations:
      required: true
  - type: textarea
    id: analyst_value
    attributes:
      label: Analyst value
      description: What business question, reporting need, implementation clarity, or QA workflow would improve?
    validations:
      required: true
  - type: textarea
    id: ga4_docs
    attributes:
      label: Official documentation
      description: Link to official Google documentation if the request concerns GA4 events, parameters, ecommerce, or collection behavior.
    validations:
      required: false
