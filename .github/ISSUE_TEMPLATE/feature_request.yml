name: Feature request
description: Suggest a web analyst, tracking-plan, template, validation, or QA-readiness improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What tracking-plan workflow should this improve?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform scope
      options:
        - GA4
        - Piano Analytics
        - Cross-platform
        - Generic workflow
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you want.
    validations:
      required: true
  - type: textarea
    id: analyst_value
    attributes:
      label: Analyst value
      description: What business question, reporting need, implementation clarity, or QA workflow would improve?
    validations:
      required: true
  - type: textarea
    id: ga4_docs
    attributes:
      label: Official documentation
      description: Link to official GA4 or Piano docs if the request concerns native events, parameters, properties, ecommerce, or SDK behavior.
    validations:
      required: false
