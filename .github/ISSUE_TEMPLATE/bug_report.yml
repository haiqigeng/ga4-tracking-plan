name: Bug report
description: Report a problem with the skill, generated tracking plan, template, or validation.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is wrong or misleading?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform scope
      options:
        - GA4
        - Piano Analytics
        - Cross-platform
        - Unknown
    validations:
      required: true
  - type: textarea
    id: analyst_context
    attributes:
      label: Analyst context
      description: What business scenario, journey, or analysis need is affected?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Non-sensitive context
      description: Add generic examples, official documentation links, or anonymized references only.
    validations:
      required: false
